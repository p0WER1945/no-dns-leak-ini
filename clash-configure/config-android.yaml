# =========================
# 机场订阅配置
# =========================
proxy-providers:
  Airplane:
    url: "http://xxxxxx"
    type: http
    interval: 2592000
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# =========================
# 基础配置
# =========================
port: 7890
socks-port: 7891
mixed-port: 7893
allow-lan: false
mode: rule
log-level: inf
ipv6: false
tcp-concurrent: true
global-client-fingerprint: chrome

# =========================
# DNS 配置（核心修复）
# =========================
dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  listen: 0.0.0.0:1053

  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.localhost"
    - "*.localdomain"
    - "msftconnecttest.com"
    - "msftncsi.com"
    - "+.ntp.org"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "ntp.*.com"
    - "+.pool.ntp.org"
    - "time1.cloud.tencent.com"
    # Android 连通性检测
    - "connectivitycheck.gstatic.com"
    - "connectivitycheck.android.com"
    - "clients3.google.com"
    - "clients1.google.com"
  
  # 用于解析 nameserver 中的域名（必须是纯 IP）
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  # ✅ 国内 DNS 解析国内域名（可靠、无需代理）
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query

  # ✅ 用于解析被代理域名（走代理出去）
  nameserver-policy:
    "geosite:geolocation-!cn":
      - https://dns.google/dns-query
      - https://dns.cloudflare.com/dns-query

# ========================
# Sniffer
# =========================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]

# =========================
# 代理节点
# =========================
proxies:
  - name: "直连"
    type: direct

# =========================
# 代理组配置
# =========================
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - 🇸🇬 新加坡-自动
      - 🇭🇰 香港-自动
      - 🇨🇳 台湾-自动
      - 🇯🇵 日本-自动
      - 🇺🇸 美国-自动
      - 直连
    include-all: true

  - name: 🇸🇬 新加坡-自动
    type: url-test
    include-all: true
    filter: "(?i)(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)"
    url: http://www.gstatic.com/generate_20
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 🇭🇰 香港-自动
    type: url-test
    include-all: true
    filter: "(?i)(广港|香港|HK|Hong Kong|🇭🇰|HongKong)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 🇨🇳 台湾-自动
    type: url-test
    include-all: true
    filter: "(?i)(广台|台湾|台灣|TW|Tai Wan|🇹🇼|TaiWan|Taiwan)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 🇯🇵 日本-自动
    type: url-test
    include-all: true
    filter: "(?i)(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000

  - name: 🇺🇸 美国-自动
    type: url-test
    include-all: true
    filter: "(?i)(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000

# =========================
# 规则部分（修复版）
# =========================
rules:
  # 1. Google / YouTube / Gemini 强制代理
  - DOMAIN-SUFFIX,google.com,🚀 节点选择
  - DOMAIN-SUFFIX,google.co.jp,🚀 节点选择
  - DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
  - DOMAIN-SUFFIX,googlevideo.com,🚀 节点选择
  - DOMAIN-SUFFIX,googleusercontent.com,🚀 节点选择
  - DOMAIN-SUFFIX,gstatic.com,🚀 节点选择
  - DOMAIN-SUFFIX,ggpht.com,🚀 节点选择
  - DOMAIN-SUFFIX,gmail.com,🚀 节点选择
  - DOMAIN-SUFFIX,youtube.com,🚀 节点选择
  - DOMAIN-SUFFIX,ytimg.com,🚀 节点选择
  - DOMAIN-KEYWORD,youtube,🚀 节点选择
  - DOMAIN-KEYWORD,gemini,🚀 节点选择

  # 2. 本地网
  - RULE-SET,local_area_network,直连

  # 3. 中国域名直连
  - RULE-SET,china_domain,直连
  - RULE-SET,china_media,直连

  # 4. 广告拦截
  - RULE-SET,ban_ad,REJECT
  - RULE-SET,ban_program_ad,REJECT

  # 5. 中国 IP
  - RULE-SET,china_company_ip,直连,no-resolve
  - RULE-SET,china_ip,直连,no-resolve
  - GEOIP,CN,直连,no-resolve

  # 6. 最终兜底 → 走代理
  - MATCH,🚀 节点选择

