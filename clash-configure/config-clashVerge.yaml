# =========================
# 机场订阅配置
# =========================
proxy-providers:
  Airplane:
    url: "http://xxxxxxx"
    type: http
    interval: 2592000
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
    proxy: 直连

# =========================
# 基础配置
# =========================
port: 7890
socks-port: 7891
mixed-port: 7893
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
tcp-concurrent: true
global-client-fingerprint: chrome

# =========================
# TUN 模式（关键修复：接管系统全部流量）
# =========================
tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "any:53"
    - "tcp://any:53"
  auto-route: true
  auto-detect-interface: true

# =========================
# DNS 配置（关键修复：防止DNS泄露）
# =========================
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.localdomain"
    - "*.localhost"
    - "*.local"
    - "msftconnecttest.com"
    - "msftncsi.com"
    - "*.msftconnecttest.com"
    - "*.msftncsi.com"
    - "+.ntp.org"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu.cn"
    - "time.*.apple.com"
    - "ntp.*.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  # 【修复核心】使用策略性DNS：国内域名用国内DNS，国外域名用代理远端DNS
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  # 【关键】代理DNS - 通过代理节点去解析，防止中转节点泄露
  proxy-server-nameserver:
    - https://dns.google/dns-query
    - https://dns.cloudflare.com/dns-query
  fallback:
    - "https://dns.google/dns-query#🚀 节点选择"
    - "https://1.1.1.1/dns-query#🚀 节点选择"
    - "tls://8.8.4.4:853#🚀 节点选择"
  fallback-filter:
    geoip: true
    geoip-code: CN
    geosite:
      - gfw
    ipcidr:
      - 240.0.0.0/4
      - 0.0.0.0/32
      - 127.0.0.1/8
  # 【关键修复】指定国内域名走国内DNS，其他走fallback
  nameserver-policy:
    "geosite:cn,private":
      - https://dns.alidns.com/dns-query
      - https://doh.pub/dns-query
    "geosite:google,youtube,telegram,gfw,geolocation-!cn":
      - "https://dns.google/dns-query#🚀 节点选择"
      - "https://dns.cloudflare.com/dns-query#🚀 节点选择"

# =========================
# Sniffer 域名嗅探（关键修复：还原fake-ip对应的真实域名）
# =========================
sniffer:
  enable: true
  force-dns-mapping: true
  parse-pure-ip: true
  override-destination: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  force-domain:
    - "+.google.com"
    - "+.googleapis.com"
    - "+.googlevideo.com"
    - "+.youtube.com"
    - "+.gemini.google.com"
  skip-domain:
    - "Mijia Cloud"
    - "+.push.apple.com"

# =========================
# 代理节点
# =========================
proxies:
  - name: "直连"
    type: direct

# =========================
# 代理组配置
# =========================
proxy-groups:
  - name: 🚀 节点选择
    type: select
    proxies:
      - 🇸🇬 新加坡-自动
      - 🇭🇰 香港-自动
      - 🇨🇳 台湾-自动
      - 🇯🇵 日本-自动
      - 🇺🇸 美国-自动
      - 直连
    include-all: true
  
  - name: 🇸🇬 新加坡-自动
    type: url-test
    include-all: true
    filter: "(?i)(广新|新加坡|SG|坡|狮城|🇸🇬|Singapore)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
  
  - name: 🇭🇰 香港-自动
    type: url-test
    include-all: true
    filter: "(?i)(广港|香港|HK|Hong Kong|🇭🇰|HongKong)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
  
  - name: 🇨🇳 台湾-自动
    type: url-test
    include-all: true
    filter: "(?i)(广台|台湾|台灣|TW|Tai Wan|🇹🇼|🇨🇳|TaiWan|Taiwan)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
  
  - name: 🇯🇵 日本-自动
    type: url-test
    include-all: true
    filter: "(?i)(广日|日本|JP|川日|东京|大阪|泉日|埼玉|沪日|深日|🇯🇵|Japan)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000
  
  - name: 🇺🇸 美国-自动
    type: url-test
    include-all: true
    filter: "(?i)(广美|美|US|纽约|波特兰|达拉斯|俄勒|凤凰城|费利蒙|硅谷|拉斯|洛杉|圣何塞|圣克拉|西雅|芝加|🇺🇸|United States)"
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    timeout: 5000

# =========================
# 规则部分
# =========================
rules:
  # 1.1 拦截类（最优先）
  - AND,((NETWORK,UDP),(DST-PORT,443)),REJECT # 阻断 QUIC
  - AND,((NETWORK,UDP),(DST-PORT,3478)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,19302)),REJECT
  # - NETWORK,UDP,REJECT
  - RULE-SET,ban_ad,REJECT
  - RULE-SET,ban_program_ad,REJECT
  - DOMAIN-KEYWORD,stun,REJECT
  # 1.2. 阻断 WebRTC STUN（防止真实IP泄露）
  - DOMAIN-SUFFIX,stun.l.google.com,REJECT
  - DOMAIN-SUFFIX,stun1.l.google.com,REJECT
  - DOMAIN-SUFFIX,stun2.l.google.com,REJECT
  - DOMAIN-SUFFIX,stun3.l.google.com,REJECT
  - DOMAIN-SUFFIX,stun4.l.google.com,REJECT

  # 2. 强制代理类
  # Google/YouTube 强制代理
  - DOMAIN-SUFFIX,google.com,🚀 节点选择
  - DOMAIN-SUFFIX,google.co.jp,🚀 节点选择
  - DOMAIN-SUFFIX,googleapis.com,🚀 节点选择
  - DOMAIN-SUFFIX,googleapis.cn,🚀 节点选择
  - DOMAIN-SUFFIX,googlevideo.com,🚀 节点选择
  - DOMAIN-SUFFIX,googleusercontent.com,🚀 节点选择
  - DOMAIN-SUFFIX,gstatic.com,🚀 节点选择
  - DOMAIN-SUFFIX,ggpht.com,🚀 节点选择
  - DOMAIN-SUFFIX,google.cn,🚀 节点选择
  - DOMAIN-SUFFIX,gemini.google.com,🚀 节点选择
  - DOMAIN-SUFFIX,ai.google.com,🚀 节点选择
  - DOMAIN-KEYWORD,google,🚀 节点选择
  - DOMAIN-KEYWORD,gmail,🚀 节点选择
  - DOMAIN-KEYWORD,youtube,🚀 节点选择
  - DOMAIN-KEYWORD,gemini,🚀 节点选择
  - DOMAIN-SUFFIX,xn--ngstr-lra8j.com,🚀 节点选择
  - DOMAIN-SUFFIX,services.googleapis.cn,🚀 节点选择
  - RULE-SET,google_cn_proxy,🚀 节点选择

  # 3. 直连类
  # 本地网络
  - RULE-SET,local_area_network,直连
  - RULE-SET,unban,直连
  # 中国域名和媒体
  - RULE-SET,china_domain,直连
  - RULE-SET,china_media,直连

  # 4. IP 兜底（需要 DNS 解析）
  # 中国IP
  - RULE-SET,china_company_ip,直连,no-resolve
  - RULE-SET,china_ip,直连,no-resolve
  # GeoIP兜底
  - GEOIP,CN,直连,no-resolve
  
  # 5. 最终兜底
  - MATCH,🚀 节点选择

